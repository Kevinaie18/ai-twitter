# Twitter Intel Digest Configuration
lists:
  - id: "2001952451281531011"
    name: "Fintwit Macro"
    scrape_interval_min: 120
    active: true

digest:
  timezone: "UTC"
  morning_hour: 7
  evening_hour: 18
  max_themes: 4               # max themes in digest (default 4)
  delta_enabled: true          # show "what changed" section
  format: split                # 'single' or 'split' (TL;DR + deep dive)
  tldr_max_words: 150          # max words for TL;DR message

consensus:
  threshold_pct: 80

enrichment:
  batch_size: 25
  max_tweets_per_scrape: 500

dashboard:
  port: 3000

scraper:
  max_pages_per_scrape: 10

# Signal noise floor — drop themes below these thresholds from digest
signal_floor:
  min_accounts: 3
  min_engagement: 50

# Source credibility tags — tag accounts for digest quality weighting
accounts:
  default_tag: unverified
  credibility_tags:
    # BarakRavid: journalist
    # citrini: analyst
    # StockNews690137: aggregator

# Theme-to-ticker mapping for price backtesting of custom themes
# Core themes (semis, macro, crypto, etc.) have built-in mappings.
# Add entries here for LLM-discovered custom themes.
theme_tickers:
  # biotech: ["XBI", "IBB"]
  # defense: ["ITA", "LMT", "RTX"]
  # real_estate: ["VNQ", "IYR"]

# Track record engine — log directional calls and compute hit rates
track_record:
  enabled: false               # opt-in: set to true to start tracking
  resolution_days: 5           # days to wait before checking if call was right
  min_confidence: 0.6          # only track calls with high confidence
  hit_threshold_pct: 0.5       # price must move this % in predicted direction
  min_calls_to_display: 5      # show hit rate only after N resolved calls
